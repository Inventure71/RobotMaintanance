services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: robot-maintenance-backend
    ports:
      - "5010:5010"
    environment:
      PORT: "5010"
    volumes:
      - backend_logs:/app/logs
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: robot-maintenance-frontend
    ports:
      - "5000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_logs:

