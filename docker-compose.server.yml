services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: vigil-backend
    ports:
      - "5010:5010"
    environment:
      PORT: "5010"
      MODEL_ASSETS_ROOT: "/app/assets/models"
    volumes:
      - type: bind
        source: ./config
        target: /app/config
        bind:
          create_host_path: true
      - type: bind
        source: ./logs
        target: /app/logs
        bind:
          create_host_path: true
      - type: bind
        source: ./assets/models
        target: /app/assets/models
        bind:
          create_host_path: true
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: vigil-frontend
    ports:
      - "5000:80"
    depends_on:
      - backend
    volumes:
      - type: bind
        source: ./assets/models
        target: /usr/share/nginx/html/assets/models
        bind:
          create_host_path: true
        read_only: true
    restart: unless-stopped
